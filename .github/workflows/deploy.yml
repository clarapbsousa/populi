name: Build & Push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: registry.henriquesf.me
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./website
          push: true
          tags: |
            registry.henriquesf.me/populi:${{ github.sha }}
            registry.henriquesf.me/populi:latest
      - name: Update NixOS Config
        run: |
          git config --global user.email "nix-bot@henriquesf.me"
          git config --global user.name "NixOS Deployment Bot"

          git clone https://x-access-token:${{ secrets.NIX_TOKEN }}@github.com/HenriqueSFernandes/dotfiles-server.git
          cd dotfiles-server

          sed -i 's|image = "registry.henriquesf.me/populi:.*";|image = "registry.henriquesf.me/populi:${{ github.sha }}";|' services/populi.nix

          git add .
          git commit -m "deploy: update populi to ${{ github.sha }}"
          git push

